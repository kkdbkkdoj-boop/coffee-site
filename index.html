<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Saudi Coffee</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        .hero {
            background: url('hero-image.jpg') no-repeat center center/cover;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
            text-shadow: 1px 1px 2px black;
        }
        .services {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .service-card {
            background: white;
            border: 1px solid gold;
            border-radius: 8px;
            padding: 20px;
            width: 30%;
            text-align: center;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>تجربة القهوة السعودية الفاخرة</h1>
    </header>

    <section class="value-proposition">
        <h2>لماذا تختارنا؟</h2>
        <p>نقدم لك أشهى أنواع القهوة بأعلى جودة وبأذواق مبتكرة.</p>
    </section>

    <section class="services">
        <div class="service-card">
            <h3>القهوة التقليدية</h3>
            <p>تجربة قهوة سعودية تقليدية لا تُنسى.</p>
        </div>
        <div class="service-card">
            <h3>الاستشارات</h3>
            <p>نقدم استشارات مخصصة في صناعة القهوة.</p>
        </div>
        <div class="service-card">
            <h3>التوريد</h3>
            <p>توريد أفضل حبوب القهوة المتميزة.</p>
        </div>
    </section>

    <section class="gallery">
        <h2>معرض الصور</h2>
        <div>
            <img src="coffee1.jpg" alt="Coffee1" />
            <img src="coffee2.jpg" alt="Coffee2" />
        </div>
    </section>

    <footer>
        <p>اتصل بنا عبر WhatsApp: <a href="https://wa.me/12345678910">تواصل الآن</a></p>
    </footer>

</body>
</html>
